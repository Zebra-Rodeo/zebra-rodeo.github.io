<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en' }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="/favicon/favicon.ico">
  <link rel="icon" type="image/svg+xml" href="/favicon/favicon.svg">
  <link rel="icon" type="image/png" sizes="96x96" href="/favicon/favicon-96x96.png">
  <link rel="apple-touch-icon" href="/favicon/apple-touch-icon.png">
  <link rel="manifest" href="/favicon/site.webmanifest">
  {% seo %}
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #3A3A3A; color: white; font-family: 'Plus Jakarta Sans', sans-serif; min-height: 100vh; display: flex; flex-direction: column; }
    header { padding: 1.5rem 2rem; display: flex; align-items: center; gap: 1rem; border-bottom: 1px solid rgba(255,255,255,0.08); }
    header a { color: white; text-decoration: none; }
    header img { height: 40px; object-fit: contain; }
    header .site-title { font-size: 1.1rem; font-weight: 600; opacity: 0.9; }
    main { flex: 1; max-width: 720px; margin: 0 auto; padding: 3rem 2rem; width: 100%; }
    footer { padding: 1.5rem 2rem; text-align: center; border-top: 1px solid rgba(255,255,255,0.08); }
    footer a { color: rgba(255,255,255,0.5); text-decoration: none; font-size: 13px; margin: 0 12px; }
    footer a:hover { color: white; }
    @media (max-width: 600px) { main { padding: 2rem 1.25rem; } }
  </style>
</head>
<body>
  <header>
    <a href="/">
      <img src="/zebra_rodeo_light.png" alt="{{ site.title }}">
    </a>
    <a href="/"><span class="site-title">{{ site.title }}</span></a>
  </header>
  <main>
    {{ content }}
  </main>
  <footer>
    <a href="/privacy-policy.html">Privacy Policy</a>
    <a href="/terms-of-service.html">Terms of Service</a>
  </footer>
</body>
</html>
