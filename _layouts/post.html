---
layout: default
---
<article>
  <header style="margin-bottom:2rem; padding-bottom:1.5rem; border-bottom:1px solid rgba(255,255,255,0.08)">
    <h1 style="font-size:1.8rem; font-weight:700; line-height:1.3; margin-bottom:0.75rem">{{ page.title }}</h1>
    <time style="color:rgba(255,255,255,0.4); font-size:0.85rem">{{ page.date | date: "%B %d, %Y" }}</time>
    {% if page.author %}<span style="color:rgba(255,255,255,0.4); font-size:0.85rem"> &middot; {{ page.author }}</span>{% endif %}
  </header>
  <div class="post-content">
    {{ content }}
  </div>
</article>
<style>
.post-content { line-height: 1.75; font-size: 1rem; }
.post-content h2 { font-size: 1.35rem; font-weight: 600; margin: 2rem 0 0.75rem; }
.post-content h3 { font-size: 1.1rem; font-weight: 600; margin: 1.5rem 0 0.5rem; }
.post-content p { margin-bottom: 1.25rem; color: rgba(255,255,255,0.85); }
.post-content a { color: white; text-decoration: underline; }
.post-content ul, .post-content ol { margin: 0 0 1.25rem 1.5rem; color: rgba(255,255,255,0.85); }
.post-content li { margin-bottom: 0.4rem; }
.post-content blockquote { border-left: 3px solid rgba(255,255,255,0.2); margin: 1.5rem 0; padding: 0.5rem 1.25rem; color: rgba(255,255,255,0.6); font-style: italic; }
.post-content code { background: rgba(255,255,255,0.08); padding: 0.15rem 0.4rem; border-radius: 3px; font-size: 0.9em; }
.post-content pre { background: rgba(255,255,255,0.05); padding: 1.25rem; border-radius: 6px; overflow-x: auto; margin-bottom: 1.25rem; }
.post-content img { max-width: 100%; border-radius: 6px; margin: 1.5rem 0; }
</style>
